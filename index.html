<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0b1020"/>
<title>Meetwoyou — Connect. Chat. Meet.</title>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" href="assets/favicon.svg"/>
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/app.css"/>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card glass">
    <img src="assets/icon-192.png" class="auth-logo" alt="Meetwoyou"/>
    <h1 class="auth-title" id="title">Welcome back</h1>
    <p class="auth-sub" id="sub">Sign in to continue to Meetwoyou</p>

    <!-- Login -->
    <form id="loginForm">
      <div class="field input-icon"><i class="fa-regular fa-envelope"></i><input class="input" type="email" id="li_email" placeholder="Email" required/></div>
      <div class="field input-icon"><i class="fa-solid fa-lock"></i><input class="input" type="password" id="li_pass" placeholder="Password" required/></div>
      <div style="text-align:right;margin:-6px 0 14px"><a href="#" id="forgotLink" style="color:var(--primary-2);font-size:13px;font-weight:600">Forgot password?</a></div>
      <button class="btn btn-primary btn-block" type="submit">Sign in</button>
      <div class="divider">or continue with</div>
      <div class="social-row">
        <button type="button" class="btn" onclick="MW.toast('Google login (demo)')"><i class="fa-brands fa-google"></i> Google</button>
        <button type="button" class="btn" onclick="MW.toast('Apple login (demo)')"><i class="fa-brands fa-apple"></i> Apple</button>
      </div>
      <p class="auth-switch">New here? <a href="#" id="toSignup">Create account</a></p>
    </form>

    <!-- Signup -->
    <form id="signupForm" style="display:none">
      <div class="field input-icon"><i class="fa-regular fa-user"></i><input class="input" id="su_name" placeholder="Full name" required/></div>
      <div class="field input-icon"><i class="fa-regular fa-envelope"></i><input class="input" type="email" id="su_email" placeholder="Email" required/></div>
      <div class="field input-icon"><i class="fa-solid fa-lock"></i><input class="input" type="password" id="su_pass" placeholder="Password (min 6)" minlength="6" required/></div>
      <button class="btn btn-primary btn-block" type="submit">Create account</button>
      <p class="auth-switch">Already a member? <a href="#" id="toLogin">Sign in</a></p>
    </form>

    <!-- Forgot -->
    <form id="forgotForm" style="display:none">
      <div class="field input-icon"><i class="fa-regular fa-envelope"></i><input class="input" type="email" id="fp_email" placeholder="Your email" required/></div>
      <button class="btn btn-primary btn-block" type="submit">Send reset link</button>
      <p class="auth-switch"><a href="#" id="toLogin2">Back to sign in</a></p>
    </form>
  </div>
</div>

<script src="assets/app.js"></script>
<script>
const $ = s=>document.querySelector(s);
function show(form,title,sub){
  ['loginForm','signupForm','forgotForm'].forEach(f=>$('#'+f).style.display='none');
  $('#'+form).style.display='block';
  $('#title').textContent=title; $('#sub').textContent=sub;
}
$('#toSignup').onclick=e=>{e.preventDefault();show('signupForm','Create account','Join the Meetwoyou community')};
$('#toLogin').onclick=e=>{e.preventDefault();show('loginForm','Welcome back','Sign in to continue to Meetwoyou')};
$('#toLogin2').onclick=e=>{e.preventDefault();show('loginForm','Welcome back','Sign in to continue to Meetwoyou')};
$('#forgotLink').onclick=e=>{e.preventDefault();show('forgotForm','Forgot password?','We will send you reset instructions')};

$('#loginForm').onsubmit=e=>{e.preventDefault();
  try{ MW.Auth.login($('#li_email').value.trim(),$('#li_pass').value); location.href='feed.html'; }
  catch(err){ MW.toast(err.message); }
};
$('#signupForm').onsubmit=e=>{e.preventDefault();
  try{ MW.Auth.signup($('#su_name').value.trim(),$('#su_email').value.trim(),$('#su_pass').value); location.href='feed.html'; }
  catch(err){ MW.toast(err.message); }
};
$('#forgotForm').onsubmit=e=>{e.preventDefault();MW.toast('Reset link sent to '+$('#fp_email').value);setTimeout(()=>show('loginForm','Welcome back','Sign in to continue to Meetwoyou'),1200);};

if(MW.Auth.session()) location.href='feed.html';
</script>
</body>
</html>
