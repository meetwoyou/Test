<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Explore · Meetwoyou</title>
<link rel="icon" href="assets/favicon.svg"/>
<link rel="manifest" href="manifest.json"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/app.css"/>
</head>
<body>
<div class="app">
  <header class="app-header"><div class="brand">Explore</div><a class="icon-btn" href="messages.html"><i class="fa-regular fa-paper-plane"></i></a></header>
  <div class="search-bar input-icon"><i class="fa-solid fa-magnifying-glass"></i><input class="input" id="q" placeholder="Search people, posts, tags"/></div>
  <div class="chip-row">
    <button class="chip active">For you</button>
    <button class="chip">Trending</button>
    <button class="chip">Photography</button>
    <button class="chip">Design</button>
    <button class="chip">Music</button>
    <button class="chip">Travel</button>
    <button class="chip">Tech</button>
  </div>
  <div class="page-title" style="padding-top:6px">People to follow</div>
  <div id="people" style="padding:0 8px 8px"></div>
  <div class="page-title">Trending</div>
  <div class="grid-3" id="grid"></div>
</div>
<div id="nav"></div>
<script src="assets/app.js"></script>
<script>
MW.Auth.require();
document.getElementById('nav').innerHTML = MW.navHTML('explore');

const imgs = [
  'https://images.unsplash.com/photo-1502602898657-3e91760cbb34?w=400',
  'https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=400',
  'https://images.unsplash.com/photo-1558655146-9f40138edfeb?w=400',
  'https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=400',
  'https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=400',
  'https://images.unsplash.com/photo-1473042904451-00171c69419d?w=400',
  'https://images.unsplash.com/photo-1493612276216-ee3925520721?w=400',
  'https://images.unsplash.com/photo-1502082553048-f009c37129b9?w=400',
  'https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?w=400',
  'https://images.unsplash.com/photo-1487014679447-9f8336841d58?w=400',
  'https://images.unsplash.com/photo-1505765050516-f72dcac9c60a?w=400',
  'https://images.unsplash.com/photo-1488646953014-85cb44e25828?w=400'
];
document.getElementById('grid').innerHTML = imgs.map(u=>`<div class="cell"><img src="${u}" loading="lazy"/></div>`).join('');

const people = MW.Store.get().users;
document.getElementById('people').innerHTML = people.map(u=>`
  <div class="card" style="display:flex;align-items:center;gap:12px;padding:12px;margin:6px 8px">
    <img src="${u.avatar}" style="width:48px;height:48px;border-radius:50%"/>
    <div style="flex:1;min-width:0">
      <div style="font-weight:700">${u.name} ${u.verified?'<i class="fa-solid fa-circle-check verified"></i>':''}</div>
      <div style="color:var(--muted);font-size:12px">@${u.username} · ${u.followers} followers</div>
    </div>
    <button class="btn btn-sm btn-primary" onclick="this.textContent=this.textContent==='Follow'?'Following':'Follow'">Follow</button>
  </div>`).join('');

document.getElementById('q').oninput=e=>{ /* demo only */ };
</script>
</body>
</html>
